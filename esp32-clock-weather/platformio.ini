; ELECROW ESP32 Rotary Display 1.28" Clock + Weather
; Target: ESP32-C3-WROOM-02 with GC9A01 240x240 round IPS display
;
; Build:  pio run
; Flash:  pio run -t upload
; Data:   pio run -t uploadfs   (uploads data/ -> LittleFS)
; Serial: pio device monitor

[env:elecrow-rotary-128]
platform = espressif32@^6.7.0
board = esp32-c3-devkitm-1
framework = arduino

board_build.filesystem = littlefs
board_build.partitions = partitions.csv

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=2
    ; --- TFT_eSPI configuration (overrides library default) ---
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=6
    -DTFT_SCLK=7
    -DTFT_CS=10
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=3
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.1.0
