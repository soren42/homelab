; ELECROW 1.28" Rotary Display (ESP32-S3R8) — Clock + Weather
;
; Hardware:
;   MCU     : ESP32-S3R8 (Xtensa LX7 dual-core, 240 MHz)
;   RAM     : 512 KB SRAM + 8 MB OPI PSRAM
;   Flash   : 8 MB QIO
;   Display : 1.28" 240x240 round IPS, GC9A01 driver
;
; Build:  pio run
; Flash:  pio run -t upload
; Data:   pio run -t uploadfs   (uploads data/config.json -> LittleFS)
; Serial: pio device monitor

[env:elecrow-rotary-128]
platform = espressif32@^6.7.0
board    = esp32-s3-devkitm-1
framework = arduino

; --- ESP32-S3R8: octal PSRAM, QIO flash, 8MB ----------------------------------
board_build.mcu                  = esp32s3
board_build.f_cpu                = 240000000L
board_build.flash_mode           = qio
board_build.psram_type           = opi
board_build.arduino.memory_type  = qio_opi
board_upload.flash_size          = 8MB
board_upload.maximum_size        = 8388608

board_build.filesystem  = littlefs
board_build.partitions  = partitions.csv

monitor_speed = 115200
upload_speed  = 921600
monitor_filters = esp32_exception_decoder

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    ; --- TFT_eSPI configuration (replaces User_Setup.h) -------------------
    ; Pin map is for the ELECROW ESP32-S3R8 1.28" Rotary Display.
    ; If the screen stays blank, double-check these against your board's
    ; schematic and update.
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=8
    -DTFT_RST=-1
    -DTFT_BL=2
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=-1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.1.0
